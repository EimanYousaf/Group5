<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mind Trick Game</title>
<link rel="stylesheet" href="Sleek.css" />
</head>
<body>

<div id="welcome-screen" class="screen active">
    <h1 class="title">🎮 Mind Trick Challenge</h1>
    <p class="subtitle">Trust nothing 😈</p>
    <button id="start-btn">Start Game</button>

<div id="main-content" class="scroll-container" style="display:none;"></div>

    <button id="restart-btn">Play Again</button>
</div>

<script src="sleek.js"></script>
</body>
</html>
