<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIND TRICK CHALLENGE</title>
  <link rel="stylesheet" href="Sleek.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="welcome-screen" class="screen">
    <div class="panel intro-panel">
      <p class="eyebrow">MIND GAME INTERFACE</p>
      <h1 class="title">MIND TRICK CHALLENGE</h1>
      <p class="subtitle">
        EVERY QUESTION IS DESIGNED TO MISLEAD YOU. READ CAREFULLY. TRUST NOTHING.
      </p>

      <label for="player-name" class="input-label">ENTER PLAYER NAME</label>
      <input type="text" id="player-name" placeholder="TYPE YOUR NAME HERE" maxlength="20" />

      <button id="start-btn">START CHALLENGE</button>
      <p id="start-warning" class="warning-text"></p>
    </div>
  </div>

  <div id="game-screen" class="screen hidden">
    <div class="hud">
      <div class="hud-box">PLAYER: <span id="player-display">GUEST</span></div>
      <div class="hud-box">SCORE: <span id="live-score">0</span></div>
      <div class="hud-box">QUESTION: <span id="question-count">1 / 10</span></div>
    </div>

    <div id="main-content" class="main-content"></div>
  </div>

  <div id="score-screen" class="screen hidden">
    <div class="panel score-panel">
      <p class="eyebrow">CHALLENGE COMPLETE</p>
      <h2 class="score-title">FINAL RESULT</h2>
      <p class="score-name"><span id="result-player-name">PLAYER</span>, YOUR FINAL SCORE IS</p>
      <h1 id="final-points">0</h1>
      <p id="score-message" class="score-message"></p>
      <button id="restart-btn">PLAY AGAIN</button>
    </div>
  </div>

  <script src="sleek.js"></script>
</body>
</html>
